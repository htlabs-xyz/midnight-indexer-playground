<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Midnight Indexer Playground</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #0d1117;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #c9d1d9;
      }
      .container {
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: 2rem;
        color: white;
        margin-bottom: 0.5rem;
      }
      p {
        color: #8b949e;
        margin-bottom: 2rem;
      }
      .cards {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .card {
        display: block;
        padding: 2rem;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 0.75rem;
        text-decoration: none;
        color: inherit;
        width: 200px;
        transition: border-color 0.2s, transform 0.2s;
      }
      .card:hover {
        border-color: #58a6ff;
        transform: translateY(-2px);
      }
      .card h2 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        color: white;
      }
      .card .badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
        margin-bottom: 1rem;
      }
      .card.v1 .badge {
        background: #1f6feb;
        color: white;
      }
      .card.v3 .badge {
        background: #238636;
        color: white;
      }
      .card .endpoint {
        font-size: 0.75rem;
        color: #8b949e;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Midnight Indexer Playground</h1>
      <p>Select a schema version to get started</p>
      <div class="cards">
        <a href="/v1" class="card v1">
          <span class="badge">V1</span>
          <h2>Indexer V1</h2>
        </a>
        <a href="/v3" class="card v3">
          <span class="badge">V3</span>
          <h2>Indexer V3</h2>
        </a>
      </div>
    </div>
  </body>
</html>
